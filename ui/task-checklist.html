<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --fg: #1f2328;
      --border: #d1d5db;
      --section-bg: #f6f8fa;
      --checked-fg: #6b7280;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --file-bg: #f0f4f8;
      --file-border: #c8d1da;
      --radius: 6px;
      --save-ok: #1a7f37;
      --save-err: #cf222e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --border: #30363d;
        --section-bg: #161b22;
        --checked-fg: #8b949e;
        --accent: #58a6ff;
        --accent-hover: #79c0ff;
        --file-bg: #161b22;
        --file-border: #30363d;
        --save-ok: #3fb950;
        --save-err: #f85149;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 16px;
      line-height: 1.5;
    }

    #app {
      max-width: 600px;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 16px;
    }

    .file-group {
      margin-bottom: 20px;
      border: 1px solid var(--file-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .file-header {
      font-size: 12px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      padding: 6px 10px;
      background: var(--file-bg);
      border-bottom: 1px solid var(--file-border);
      color: var(--checked-fg);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-header .icon {
      font-size: 14px;
    }

    .file-body {
      padding: 8px 10px;
    }

    .section {
      margin-bottom: 12px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--checked-fg);
      margin: 0 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
    }

    .task-item input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    .task-item input[type="checkbox"]:disabled {
      cursor: wait;
    }

    .task-label {
      cursor: pointer;
      user-select: none;
    }

    .task-label.done {
      text-decoration: line-through;
      color: var(--checked-fg);
    }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--checked-fg);
      min-height: 16px;
      transition: opacity 0.3s;
    }

    #status.ok { color: var(--save-ok); }
    #status.err { color: var(--save-err); }

    #loading {
      color: var(--checked-fg);
    }
  </style>
</head>
<body>
  <div id="app">
    <h2>📋 Tasks</h2>
    <div id="sections">
      <p id="loading">Loading tasks…</p>
    </div>
    <div id="status"></div>
  </div>

  <script>
    const sectionsEl = document.getElementById('sections');
    const statusEl = document.getElementById('status');

    let statusTimer = null;

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || '';
      if (statusTimer) clearTimeout(statusTimer);
      statusTimer = setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 3000);
    }

    /**
     * Auto-save a single checkbox toggle immediately.
     */
    async function autoSave(file, line, checked, checkboxEl, labelEl) {
      checkboxEl.disabled = true;

      try {
        await window.__mcp_rpc('update_tasks', {
          file,
          updates: [{ line, checked }],
        });
        showStatus(`✅ Saved`, 'ok');
      } catch (err) {
        // Revert on failure
        checkboxEl.checked = !checked;
        labelEl.className = 'task-label' + (!checked ? ' done' : '');
        showStatus(`❌ Error: ${err.message ?? String(err)}`, 'err');
      } finally {
        checkboxEl.disabled = false;
      }
    }

    function renderFileGroups(fileGroups) {
      sectionsEl.innerHTML = '';

      const withTasks = fileGroups.filter(fg =>
        fg.sections.some(s => s.tasks.length > 0)
      );

      if (withTasks.length === 0) {
        sectionsEl.innerHTML = '<p>No checklists found in any markdown file.</p>';
        return;
      }

      for (const fg of withTasks) {
        const groupEl = document.createElement('div');
        groupEl.className = 'file-group';

        const headerEl = document.createElement('div');
        headerEl.className = 'file-header';
        headerEl.innerHTML = `<span class="icon">📄</span> ${escapeHtml(fg.file)}`;
        groupEl.appendChild(headerEl);

        const bodyEl = document.createElement('div');
        bodyEl.className = 'file-body';

        const visibleSections = fg.sections.filter(s => s.tasks.length > 0);

        for (const section of visibleSections) {
          const sectionEl = document.createElement('div');
          sectionEl.className = 'section';

          const titleEl = document.createElement('div');
          titleEl.className = 'section-title';
          titleEl.textContent = section.name;
          sectionEl.appendChild(titleEl);

          const listEl = document.createElement('ul');
          listEl.className = 'task-list';

          for (const task of section.tasks) {
            const itemEl = document.createElement('li');
            itemEl.className = 'task-item';

            const checkboxEl = document.createElement('input');
            checkboxEl.type = 'checkbox';
            checkboxEl.checked = task.checked;
            checkboxEl.id = `task-${fg.file}-${task.line}`;

            const labelEl = document.createElement('label');
            labelEl.htmlFor = checkboxEl.id;
            labelEl.className = 'task-label' + (task.checked ? ' done' : '');
            labelEl.textContent = task.text;

            checkboxEl.addEventListener('change', () => {
              const newChecked = checkboxEl.checked;
              labelEl.className = 'task-label' + (newChecked ? ' done' : '');
              autoSave(fg.file, task.line, newChecked, checkboxEl, labelEl);
            });

            itemEl.appendChild(checkboxEl);
            itemEl.appendChild(labelEl);
            listEl.appendChild(itemEl);
          }

          sectionEl.appendChild(listEl);
          bodyEl.appendChild(sectionEl);
        }

        groupEl.appendChild(bodyEl);
        sectionsEl.appendChild(groupEl);
      }
    }

    function escapeHtml(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    // MCP Apps RPC protocol: the host calls window.__mcp_init with the tool result data
    // and provides window.__mcp_rpc for calling back into the MCP server.
    window.__mcp_init = function(data) {
      try {
        const fileGroups = typeof data === 'string' ? JSON.parse(data) : data;
        renderFileGroups(fileGroups);
      } catch (err) {
        sectionsEl.innerHTML = `<p>Error loading tasks: ${err.message ?? String(err)}</p>`;
      }
    };
  </script>
</body>
</html>
